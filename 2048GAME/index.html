<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#faf8ef" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Classic 2048 puzzle — Solo, vs AI, vs Friend, Watch AI. Play online or offline." />
  <title>2048</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════ INSTALL BANNER ═══════════════ -->
<div id="install-banner" class="install-banner" style="display:none">
  <span class="ib-icon">📲</span>
  <span class="ib-text">Install 2048 — play offline anytime!</span>
  <button id="install-btn" class="ib-install">Install</button>
  <button id="install-dismiss" class="ib-dismiss">✕</button>
</div>

<!-- ═══════════════ OFFLINE TOAST ═══════════════ -->
<div id="offline-toast" class="offline-toast" style="display:none">
  📴 You're offline — game still works!
</div>

<!-- ═══════════════ MENU SCREEN ═══════════════ -->
<div id="menu-screen" class="screen active">
  <div class="menu-scroll">
    <div class="menu-container">

      <!-- Logo -->
      <div class="menu-logo-wrap">
        <div class="menu-logo">2048</div>
        <p class="menu-tagline">Join the tiles — reach <strong>2048!</strong></p>
      </div>

      <!-- Mode cards -->
      <div class="mode-section-label">Choose a Mode</div>

      <div class="mode-cards">

        <!-- Solo -->
        <button class="mode-card active" data-mode="solo">
          <span class="mc-icon">🎮</span>
          <span class="mc-title">Solo Play</span>
          <span class="mc-desc">Classic 2048 — just you</span>
        </button>

        <!-- vs AI -->
        <button class="mode-card" data-mode="vs-ai">
          <span class="mc-icon">🤖</span>
          <span class="mc-title">Play vs AI</span>
          <span class="mc-desc">Race against the AI</span>
        </button>

        <!-- vs Friend -->
        <button class="mode-card" data-mode="vs-friend">
          <span class="mc-icon">👥</span>
          <span class="mc-title">vs Friend</span>
          <span class="mc-desc">Two players, take turns</span>
        </button>

        <!-- Watch AI -->
        <button class="mode-card" data-mode="ai">
          <span class="mc-icon">👁️</span>
          <span class="mc-title">Watch AI</span>
          <span class="mc-desc">See the AI solve it</span>
        </button>

      </div>

      <!-- AI Difficulty (shown for vs-ai & ai modes) -->
      <div class="diff-section" id="diff-section" style="display:none">
        <div class="mode-section-label">AI Difficulty</div>
        <div class="diff-pills">
          <button class="diff-pill easy"   data-diff="easy">😊 Easy</button>
          <button class="diff-pill medium active" data-diff="medium">🧠 Medium</button>
          <button class="diff-pill hard"   data-diff="hard">🔥 Hard</button>
        </div>
        <div class="diff-hint" id="diff-hint">Expectimax depth 3 — solid strategy</div>
      </div>

      <!-- Start button -->
      <button id="start-btn" class="start-btn">▶ Start Game</button>

      <!-- Footer hint -->
      <div class="menu-hint">
        <span class="hint-icon">⬆️⬇️⬅️➡️</span> Arrow keys &nbsp;·&nbsp;
        <span class="hint-icon">👆</span> Swipe on mobile
      </div>

    </div>
  </div>
</div>

<!-- ═══════════════ GAME SCREEN ═══════════════ -->
<div id="game-screen" class="screen">

  <!-- Top header -->
  <div class="game-header">
    <div class="gh-logo">2048</div>
    <div class="gh-scores" id="gh-scores"></div>
    <div class="gh-actions">
      <button id="menu-btn"    class="hdr-btn" title="Menu">☰</button>
      <button id="restart-btn" class="hdr-btn" title="New Game">↺</button>
    </div>
  </div>

  <!-- Mode / turn banner -->
  <div class="game-banner" id="game-banner"></div>

  <!-- Board area -->
  <div class="boards-area" id="boards-area"></div>

  <!-- Watch-AI controls bar -->
  <div class="ai-bar" id="ai-bar" style="display:none">
    <button id="ai-toggle" class="ai-toggle-btn">⏸ Pause</button>
    <div class="ai-speed-wrap">
      <span>🐢</span>
      <input id="ai-speed" type="range" min="1" max="10" value="5" />
      <span>⚡</span>
    </div>
  </div>

  <!-- On-screen swipe arrows for mobile (vs-friend only, optional hint) -->
  <div class="touch-hint" id="touch-hint" style="display:none">
    Swipe or use arrows to move
  </div>

  <!-- Game-over / win overlay -->
  <div class="game-overlay" id="game-overlay" style="display:none">
    <div class="go-box">
      <div class="go-emoji" id="go-emoji">🏆</div>
      <h2 id="go-title">Game Over</h2>
      <p  id="go-sub"></p>
      <div class="go-scores" id="go-scores"></div>
      <div class="go-actions">
        <button id="go-again">▶ Play Again</button>
        <button id="go-menu">☰ Menu</button>
      </div>
    </div>
  </div>

</div>

<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script>
  /* ── Service Worker registration ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  /* ── Online / Offline toast ── */
  const offlineToast = document.getElementById('offline-toast');
  function showOfflineToast() {
    offlineToast.style.display = 'block';
    setTimeout(() => { offlineToast.style.display = 'none'; }, 3500);
  }
  window.addEventListener('offline', showOfflineToast);
  window.addEventListener('online', () => {
    offlineToast.textContent = '✅ Back online!';
    offlineToast.style.display = 'block';
    setTimeout(() => {
      offlineToast.style.display = 'none';
      offlineToast.textContent = '📴 You\'re offline — game still works!';
    }, 2500);
  });
  if (!navigator.onLine) showOfflineToast();

  /* ── PWA Install prompt ── */
  let deferredPrompt = null;
  const installBanner  = document.getElementById('install-banner');
  const installBtn     = document.getElementById('install-btn');
  const installDismiss = document.getElementById('install-dismiss');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.style.display = 'flex';
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.style.display = 'none';
  });

  installDismiss.addEventListener('click', () => {
    installBanner.style.display = 'none';
  });

  window.addEventListener('appinstalled', () => {
    installBanner.style.display = 'none';
    deferredPrompt = null;
  });
</script>
</body>
</html>
